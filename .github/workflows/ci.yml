name: ci

# Reproducibility insurance: runs the model-free unit suite + lint on every push
# so "tests green" holds across machines (notably the GPU node's Python 3.10 vs
# the local 3.11). The heavy LIBERO/mujoco extra and GPU stack are NOT installed —
# only the model-free core, which is exactly what these 395 tests cover.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install the pinned Python
        run: uv python install

      - name: Sync dependencies (locked — fails if uv.lock drifted)
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Test (pytest)
        run: uv run pytest -q
