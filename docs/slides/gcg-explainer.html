<!--
  GCG explainer deck — self-study teaching artifact (docs/, no src/, no model run).
  Single self-contained file: <style> theme/fragments · <body> 12 slides · <script> nav + anim drivers.
  All shown numbers come from JS constants (DRY) reusing this project's real smoke-log values.
  Build plan: docs/plans/2026-06-21-gcg-explainer-slides.md

<style>
/* ============================================================ *
 * THEME TOKENS                                                 *
 * ============================================================ */
:root {
  --bg:    #0b0f1a;   /* deep navy-black */
  --bg2:   #131a2b;   /* panel */
  --bg3:   #1c263d;   /* raised cell */
  --fg:    #e6ebf5;
  --muted: #8a96b0;
  --green: #43d17a;   /* loss going down / good direction */
  --red:   #ff5470;   /* most-negative gradient / chosen candidate */
  --blue:  #5b9dff;   /* neutral accent */
  --gold:  #ffcf5c;   /* secondary highlight */
  --line:  #2a3550;
  --mono:  "SF Mono", "JetBrains Mono", Menlo, Consolas, "Courier New", monospace;
  --sans:  -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
  --radius: 12px;
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; overflow: hidden; }
body {
  background: radial-gradient(1200px 800px at 70% -10%, #16203a 0%, var(--bg) 60%);
  color: var(--fg);
  font-family: var(--sans);
  font-size: clamp(16px, 1.7vw, 22px);
  line-height: 1.55;
}

/* ============================================================ *
 * SLIDE FRAME                                                  *
 * ============================================================ */
#deck { position: fixed; inset: 0; }

.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 6vh 8vw 12vh;
  opacity: 0; visibility: hidden;
  transform: scale(0.99);
  transition: opacity .45s ease, transform .45s ease;
  text-align: center;
}
.slide.active { opacity: 1; visibility: visible; transform: none; }

.slide h1 { font-size: clamp(28px, 4.4vw, 56px); font-weight: 800; margin: 0 0 .4em; letter-spacing: .01em; }
.slide h2 { font-size: clamp(22px, 3vw, 38px); font-weight: 700; margin: 0 0 .7em; }
.slide p  { margin: .35em 0; max-width: 60ch; }
.caption  { color: var(--muted); font-size: .92em; max-width: 64ch; }
.kbd { font-family: var(--mono); background: var(--bg3); border: 1px solid var(--line);
       border-radius: 6px; padding: .05em .45em; font-size: .9em; }
.mono { font-family: var(--mono); }
.green { color: var(--green); }  .red { color: var(--red); }  .blue { color: var(--blue); }  .gold { color: var(--gold); }
.dim { color: var(--muted); }

/* slide title chip (top-left) + counter (top-right) */
.topbar { position: fixed; top: 2.4vh; left: 0; right: 0; display: flex; justify-content: space-between;
          align-items: center; padding: 0 3vw; font-family: var(--mono); font-size: 14px; color: var(--muted);
          pointer-events: none; z-index: 30; }
.topbar .title { color: var(--blue); }

/* ============================================================ *
 * FRAGMENTS (hand-rolled reveal.js-style)                      *
 * ============================================================ */
.fragment { opacity: 0; transform: translateY(10px); transition: opacity .4s ease, transform .4s ease; }
.fragment.visible { opacity: 1; transform: none; }

/* ============================================================ *
 * PROGRESS DOTS + HINT                                         *
 * ============================================================ */
#dots { position: fixed; bottom: 3.2vh; left: 0; right: 0; display: flex; gap: 9px;
        justify-content: center; z-index: 30; }
#dots .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--line);
             cursor: pointer; transition: background .25s, transform .25s; }
#dots .dot:hover { background: var(--muted); }
#dots .dot.active { background: var(--blue); transform: scale(1.35); }

#hint { position: fixed; bottom: 2.6vh; right: 3vw; font-family: var(--mono); font-size: 12px;
        color: var(--muted); z-index: 30; opacity: .8; }

/* ============================================================ *
 * SHARED COMPONENTS                                            *
 * ============================================================ */

/* --- token-strip (#2, hero slides) --- */
.token-strip { display: flex; align-items: flex-end; gap: 14px; flex-wrap: wrap; justify-content: center; }
.seg { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.seg-label { font-family: var(--mono); font-size: 12px; color: var(--muted); }
.cells { display: flex; gap: 4px; }
.cell { font-family: var(--mono); font-size: 14px; min-width: 1.7em; padding: .35em .5em; text-align: center;
        background: var(--bg3); border: 1px solid var(--line); border-radius: 7px; }
.seg.fixed .cell { color: var(--muted); }
.seg.suffix .cell { color: var(--fg); border-color: var(--gold); }
.seg.suffix.blink .cell { animation: blink 1.4s ease-in-out infinite; }
@keyframes blink { 0%,100% { box-shadow: 0 0 0 0 rgba(255,207,92,0); }
                   50% { box-shadow: 0 0 14px 2px rgba(255,207,92,.55); } }
.flow-arrow { font-size: 24px; color: var(--blue); align-self: center; }

/* --- #3 number line --- */
.numline { position: relative; width: min(680px, 80vw); height: 120px; margin-top: 1em; }
.numline .axis { position: absolute; top: 60px; left: 0; right: 0; height: 2px; background: var(--line); }
.numline .tick { position: absolute; top: 44px; width: 2px; height: 34px; background: var(--fg); }
.numline .tick .lab { position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
                      font-family: var(--mono); font-size: 14px; white-space: nowrap; }
.numline .ghost { position: absolute; top: 18px; transform: translateX(-50%); text-align: center;
                  font-family: var(--mono); color: var(--red); font-size: 14px; }
.numline .ghost .x { font-size: 22px; display: block; }

/* --- #4 two-stage boxes --- */
.stages { display: flex; align-items: center; gap: 26px; margin: .6em 0; flex-wrap: wrap; justify-content: center; }
.stage { background: var(--bg2); border: 2px solid var(--line); border-radius: var(--radius);
         padding: 1.1em 1.4em; min-width: 230px; transition: border-color .3s, box-shadow .3s; }
.stage .n { font-family: var(--mono); font-size: 14px; color: var(--muted); }
.stage .t { font-size: 1.05em; font-weight: 700; margin-top: .2em; }
.stage.lit.propose { border-color: var(--blue); box-shadow: 0 0 22px -4px var(--blue); }
.stage.lit.verify  { border-color: var(--green); box-shadow: 0 0 22px -4px var(--green); }
.stage-arrow { font-size: 30px; color: var(--muted); transition: color .3s; }
.stage-arrow.lit { color: var(--fg); }

/* --- #12 code-map table --- */
.codemap { border-collapse: collapse; font-size: .92em; }
.codemap td, .codemap th { border: 1px solid var(--line); padding: .55em .9em; text-align: left; }
.codemap th { color: var(--muted); font-weight: 600; }
.codemap .step { font-family: var(--mono); white-space: nowrap; }
.codemap .fn { font-family: var(--mono); color: var(--green); }

/* --- #5 one-hot × W = row pluck --- */
.rowpluck { display: flex; align-items: center; gap: 18px; font-family: var(--mono); margin: .4em 0; flex-wrap: wrap; justify-content: center; }
.onehot, .matrix { display: flex; flex-direction: column; gap: 4px; }
.matrix .mrow { display: flex; gap: 4px; align-items: center; transition: transform .5s ease, box-shadow .5s ease, opacity .5s ease; }
.mlabel { width: 3em; text-align: right; color: var(--muted); font-size: 13px; }
.mcell, .ohcell { min-width: 3.4em; padding: .3em .4em; text-align: center; background: var(--bg3);
                  border: 1px solid var(--line); border-radius: 6px; }
.ohcell.one { color: var(--gold); border-color: var(--gold); }
.matrix .mrow.pluck { transform: translateX(10px) scale(1.06); box-shadow: 0 0 18px -2px var(--gold); z-index: 2; }
.matrix .mrow.pluck .mcell { border-color: var(--gold); color: var(--gold); }
.matrix .mrow.dim { opacity: .3; }
.eq { font-size: 1.4em; color: var(--muted); }
.evec { display: flex; gap: 4px; opacity: 0; transition: opacity .5s ease; }
.evec.show { opacity: 1; }
.evec .mcell { border-color: var(--gold); color: var(--gold); }

/* --- #6 backprop chain --- */
.chain { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
         font-family: var(--mono); margin: .6em 0; }
.chain .node { padding: .5em .7em; border: 1px solid var(--line); border-radius: 8px; background: var(--bg2);
               font-size: 14px; transition: box-shadow .35s, border-color .35s, color .35s; }
.chain .node.grad { border-color: var(--red); color: var(--red); box-shadow: 0 0 18px -3px var(--red); }
.chain .node.nodiff { border-style: dashed; color: var(--muted); }
.chain .ar { color: var(--muted); }

/* --- #7 swap-scores --- */
.scores { display: flex; flex-direction: column; gap: 6px; font-family: var(--mono); margin-top: .4em; }
.score-head { color: var(--muted); font-size: 14px; margin: .3em 0; }
.score-row { display: flex; align-items: center; gap: 14px; opacity: 0; transform: translateX(-12px);
             transition: opacity .35s, transform .35s; padding: .22em .6em; border-radius: 7px; }
.score-row.show { opacity: 1; transform: none; }
.score-row .tok { width: 4em; text-align: right; }
.score-row .val { width: 5em; text-align: right; }
.score-row.win { background: rgba(255,84,112,.14); }
.score-row.win .val, .score-row.win .tok { color: var(--red); font-weight: 700; }
.score-row .tag { color: var(--red); font-size: 13px; }

/* --- #8 hero ①: one-step pipeline --- */
.pipeline { display: flex; align-items: stretch; gap: 12px; flex-wrap: wrap; justify-content: center; }
.pblock { background: var(--bg2); border: 1px solid var(--line); border-radius: 12px; padding: .8em .9em;
          min-width: 168px; opacity: .4; transition: opacity .4s, border-color .4s, box-shadow .4s; }
.pblock.lit { opacity: 1; border-color: var(--blue); box-shadow: 0 0 20px -6px var(--blue); }
.pblock .pt { font-family: var(--mono); font-size: 12px; color: var(--blue); margin-bottom: .5em; }
.pblock .pd { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: .5em; line-height: 1.4; }
.parrow { align-self: center; color: var(--muted); font-size: 22px; }
.grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; }
.gcell { width: 13px; height: 9px; background: var(--bg3); border-radius: 2px; transition: background .3s; }
.gcell.hot { background: var(--red); }
.candrow { display: flex; gap: 3px; align-items: center; margin: 3px 0; font-family: var(--mono); }
.candrow .scell { min-width: 1.4em; padding: .12em .25em; text-align: center; background: var(--bg3);
                  border: 1px solid var(--line); border-radius: 4px; font-size: 10px; }
.candrow .scell.swap { border-color: var(--gold); color: var(--gold); }
.candrow .closs { margin-left: 6px; color: var(--muted); font-size: 11px; opacity: 0; transition: opacity .4s; }
#pipe.showloss .candrow .closs { opacity: 1; }
.candrow.win .closs { color: var(--green); font-weight: 700; }
#pipe.showloss .candrow.win .scell.swap { border-color: var(--green); color: var(--green); }
.picked { opacity: 0; color: var(--green); font-family: var(--mono); font-weight: 700; margin-top: .5em; transition: opacity .4s; }
#pipe.showloss .picked { opacity: 1; }
.replay { margin-top: 1.1em; font-family: var(--mono); font-size: 14px; background: var(--bg3); color: var(--fg);
          border: 1px solid var(--line); border-radius: 8px; padding: .4em .95em; cursor: pointer; }
.replay:hover { border-color: var(--blue); }

/* --- #9 hero ②: loop + loss bar --- */
.loop-suffix { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; font-family: var(--mono); margin-bottom: .7em; }
.lcell { min-width: 1.5em; padding: .25em .35em; text-align: center; background: var(--bg3);
         border: 1px solid var(--line); border-radius: 5px; font-size: 12px;
         transition: background .2s, border-color .2s, color .2s; }
.lcell.flash { background: var(--red); border-color: var(--red); color: #fff; animation: flashpulse .7s ease; }
@keyframes flashpulse { 0% { transform: scale(1.3); } 100% { transform: scale(1); } }
.lossbar-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: .4em; }
.lossbar { width: 90px; height: 200px; background: var(--bg2); border: 1px solid var(--line);
           border-radius: 8px; display: flex; align-items: flex-end; overflow: hidden; }
.lossfill { width: 100%; background: linear-gradient(180deg, var(--blue), var(--green));
            transition: height .9s cubic-bezier(.2,.7,.2,1); }
.lossnum { font-family: var(--mono); font-size: 20px; color: var(--green); }
.loop-ctrls { display: flex; gap: 8px; align-items: center; margin-top: 1em; flex-wrap: wrap; justify-content: center; }
.loop-ctrls button { font-family: var(--mono); font-size: 13px; background: var(--bg3); color: var(--fg);
                     border: 1px solid var(--line); border-radius: 7px; padding: .35em .7em; cursor: pointer; }
.loop-ctrls button:hover { border-color: var(--blue); }

/* --- #11 real-dimension mapping + sparkline --- */
.dims { display: flex; gap: 26px; flex-wrap: wrap; justify-content: center; font-family: var(--mono); margin: .4em 0 1em; color: var(--muted); }
.dims b { color: var(--fg); }
.sparklab { fill: var(--blue); font-family: var(--mono); font-size: 13px; }
.sparklab.end { fill: var(--green); }
</style>

<body>

<div class="topbar"><span class="title" id="slideTitle">—</span><span id="slideCounter">1 / 12</span></div>

<div id="deck">
  <!-- 12 slides; content filled by Tasks 2–5. Each carries data-title for the topbar. -->
  <section class="slide" data-title="title"></section>          <!-- #1  Title -->
  <section class="slide" data-title="setup"></section>          <!-- #2  Setup -->
  <section class="slide" data-title="discrete"></section>       <!-- #3  Discrete-token problem -->
  <section class="slide" data-title="core-idea"></section>      <!-- #4  Core idea -->
  <section class="slide" data-title="onehot×W"></section>       <!-- #5  onehot × W = row pluck -->
  <section class="slide" data-title="backprop"></section>       <!-- #6  backprop chain -->
  <section class="slide" data-title="swap-scores"></section>    <!-- #7  toy swap-scores -->
  <section class="slide" data-title="step ①"></section>         <!-- #8  HERO: one GCG step -->
  <section class="slide" data-title="loop ②"></section>         <!-- #9  HERO: loop iteration -->
  <section class="slide" data-title="gibberish"></section>      <!-- #10 why gibberish -->
  <section class="slide" data-title="real dims"></section>      <!-- #11 mapping to real thing -->
  <section class="slide" data-title="summary"></section>        <!-- #12 summary ↔ code -->
</div>

<div id="dots"></div>
<div id="hint"><span class="kbd">→</span>/<span class="kbd">Space</span> next · <span class="kbd">←</span> back · <span class="kbd">F</span> fullscreen</div>

<script>
"use strict";

/* ============================================================ *
 * SHARED DATA CONTRACT  (single source of truth — DRY)         *
 * Consumed by Tasks 1/3/5. Render from these; never hard-code  *
 * the numbers into markup.                                     *
 * ============================================================ */

// Real tiny-run loss trajectory
// — results/_smoke/2026-06-19T15-10-36Z-gcg-tiny-smoke/smoke_result.json
const LOSS_HISTORY = [15.60, 14.46, 13.08, 12.71, 12.38, 12.08, 11.35, 10.47, 10.09, 9.73, 9.52];
const FINAL_SUFFIX = "xforum x x mang im x x x x x egg x robot x x明� He flower";

// Real dimensions (step-3 / step-5.5 smoke logs + GcgConfig)
const DIMS = { V: 32000, d: 4096, L: 20, topK: 256 };

// Toy worked example from the 2026-06-21 session (V=5, d=3)
const TOY_VOCAB = ["cat", "dog", "x", "run", "sky"];
const TOY_W = [           // [V=5][d=3] embedding matrix
  [ 0.10, -0.20,  0.05],
  [-0.30,  0.10,  0.40],
  [ 0.02,  0.01, -0.03],  // current token at position i = "x" (index 2)
  [ 0.50, -0.10,  0.20],
  [-0.05,  0.30, -0.15],
];
const TOY_GRAD_E = [1.2, -0.5, 0.8];   // d(loss)/d(e_i)
const TOY_CUR_TOKEN = 2;               // "x"
// Expected (computed on screen by swapScores, NOT hard-coded):
//   grad_e · W[v] → [0.26, -0.09, -0.005, 0.81, -0.33] ; argmin = index 4 ("sky"), flares red

/* ============================================================ *
 * NAVIGATION ENGINE                                            *
 * ============================================================ */
const slides = Array.from(document.querySelectorAll('.slide'));
const dotsWrap = document.getElementById('dots');
const titleEl = document.getElementById('slideTitle');
const counterEl = document.getElementById('slideCounter');
let current = 0;

// Per-slide "enter" handlers, registered by Tasks 4/5 to (re)start animations.
const slideEnterHandlers = {};   // { [index]: () => void }

// Build progress dots.
slides.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.addEventListener('click', () => goTo(i, true));   // jump shows the slide fully revealed
  dotsWrap.appendChild(dot);
});
const dots = Array.from(dotsWrap.children);

function updateChrome() {
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
  titleEl.textContent = slides[current].dataset.title || '';
  counterEl.textContent = (current + 1) + ' / ' + slides.length;
}

// Show slide `i`. revealAll=true reveals every fragment at once (used when jumping
// back/forward so a visited slide isn't shown half-empty).
function goTo(i, revealAll = false) {
  if (i < 0 || i >= slides.length) return;
  clearAnims();                                   // stop any running per-slide animation
  slides[current].classList.remove('active');
  current = i;
  const s = slides[current];
  s.classList.add('active');
  s.querySelectorAll('.fragment').forEach(f => f.classList.toggle('visible', revealAll));
  updateChrome();
  const handler = slideEnterHandlers[current];
  if (handler) handler();
}

// Reveal the next hidden fragment on the current slide; else advance to next slide.
function next() {
  const hidden = slides[current].querySelector('.fragment:not(.visible)');
  if (hidden) { hidden.classList.add('visible'); return; }
  if (current < slides.length - 1) goTo(current + 1, false);
}

// Hide the last revealed fragment; else retreat to previous slide (fully revealed).
function prev() {
  const shown = slides[current].querySelectorAll('.fragment.visible');
  if (shown.length) { shown[shown.length - 1].classList.remove('visible'); return; }
  if (current > 0) goTo(current - 1, true);
}

function toggleFullscreen() {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen?.();
}

document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
    case 'ArrowLeft':  case 'PageUp':             e.preventDefault(); prev(); break;
    case 'f': case 'F':                           e.preventDefault(); toggleFullscreen(); break;
    case 'Home':                                  e.preventDefault(); goTo(0, false); break;
    case 'End':                                   e.preventDefault(); goTo(slides.length - 1, true); break;
  }
});

/* ------------------------------------------------------------ *
 * SLIDE BUILDERS                                               *
 * Each builder returns the slide's innerHTML. Building markup  *
 * in JS lets every figure render straight from the data        *
 * constants above — no number is ever duplicated into markup.  *
 * ------------------------------------------------------------ */
const builders = {};

// animation-timer bookkeeping (cleared by goTo → clearAnims)
let _timers = [];
function track(id) { _timers.push(id); return id; }
function clearAnims() { _timers.forEach(id => { clearTimeout(id); clearInterval(id); }); _timers = []; }

// small markup helpers
const cellRow = (n, tok) => Array.from({ length: n }, () => `<span class="cell">${tok}</span>`).join('');

/* ---- Task 2: narrative slides (#1,#2,#3,#4,#10,#12) ---- */

// #1 Title
builders[0] = () => `
  <h1>How GCG Crafts Its <span class="gold">"Magic Spell"</span></h1>
  <p class="fragment">An adversarial suffix, built one token swap at a time —
     <span class="blue">gradient proposes</span>, <span class="green">forward verifies</span>.</p>
  <p class="fragment mono dim" style="margin-top:1.5em; font-size:.78em; max-width:46ch; word-break:break-all;">${FINAL_SUFFIX}</p>
  <p class="fragment caption">↑ the gibberish suffix this process actually produced (this project's tiny run)</p>
`;

// #2 Setup — attack surface
builders[1] = () => `
  <h2 class="fragment">The attack surface</h2>
  <div class="token-strip fragment">
    <div class="seg fixed"><div class="seg-label">instruction · fixed</div>
      <div class="cells"><span class="cell">pick</span><span class="cell">up</span><span class="cell">the</span><span class="cell">cup</span></div></div>
    <div class="flow-arrow">⊕</div>
    <div class="seg suffix blink"><div class="seg-label">suffix · ${DIMS.L} tokens · ATTACKED</div>
      <div class="cells">${cellRow(DIMS.L, 'x')}</div></div>
    <div class="flow-arrow">⊕</div>
    <div class="seg fixed"><div class="seg-label">template tail · fixed</div>
      <div class="cells"><span class="cell">[/INST]</span></div></div>
    <div class="flow-arrow">→</div>
    <div class="seg fixed"><div class="seg-label">target action · fixed</div>
      <div class="cells"><span class="cell">wrong</span><span class="cell">▶</span></div></div>
  </div>
  <p class="caption fragment">Only the <span class="gold">${DIMS.L} suffix tokens</span> are optimized. The instruction and the target action are held fixed — GCG searches for the suffix that makes the model emit the target.</p>
`;

// #3 Discrete-token problem
builders[2] = () => `
  <h2 class="fragment">Why ordinary gradient descent fails</h2>
  <p class="fragment">A token is an <span class="gold">integer ID</span>, not a continuous knob.</p>
  <div class="numline fragment">
    <div class="axis"></div>
    <div class="tick" style="left:30%"><span class="lab">3192 · "▁the"</span></div>
    <div class="tick" style="left:70%"><span class="lab">3193 · "▁then"</span></div>
    <div class="ghost" style="left:50%"><span class="x">✗</span>3192.5 ?</div>
  </div>
  <p class="fragment caption">Gradient descent nudges a parameter by a tiny ε. There is no token <span class="mono">3192.5</span> to step into → the slope <em>over token IDs</em> is <span class="red">undefined</span>.</p>
`;

// #4 Core idea — two stages (boxes alternate-glow once revealed)
builders[3] = () => `
  <h2 class="fragment">The core idea: two stages</h2>
  <div class="stages">
    <div class="stage propose fragment" id="stageA"><div class="n">stage ①</div><div class="t blue">Gradient proposes</div>
      <div class="caption">cheap — one backward pass ranks every candidate swap</div></div>
    <div class="stage-arrow fragment" id="arrA">→</div>
    <div class="stage verify fragment" id="stageB"><div class="n">stage ②</div><div class="t green">Forward verifies</div>
      <div class="caption">honest — real forward passes measure the true loss</div></div>
  </div>
  <p class="fragment caption">The gradient over the continuous <em>embedding</em> only <span class="blue">proposes</span> promising tokens; a real forward pass then <span class="green">verifies</span> which swap actually lowers the loss.</p>
`;
slideEnterHandlers[3] = () => {
  const a = document.getElementById('stageA'), b = document.getElementById('stageB'), arr = document.getElementById('arrA');
  if (!a || !b) return;
  let propose = true;
  track(setInterval(() => {
    a.classList.toggle('lit', propose);
    b.classList.toggle('lit', !propose);
    arr.classList.add('lit');
    propose = !propose;
  }, 900));
};

// #10 Why gibberish
builders[9] = () => `
  <h2 class="fragment">Why the suffix is gibberish</h2>
  <p class="fragment">Every swap is chosen by <span class="green">loss</span>, never by meaning.</p>
  <p class="fragment">On slide 7, <span class="red">"sky"</span> won only because <span class="mono">grad·W</span> was the most negative — it had nothing to do with the sentence.</p>
  <p class="fragment mono dim" style="font-size:.78em; max-width:46ch; word-break:break-all; margin-top:1em;">${FINAL_SUFFIX}</p>
  <p class="fragment caption">${DIMS.L} tokens tuned purely to push the loss down → unreadable, but effective.</p>
`;

// #12 Summary ↔ code
builders[11] = () => `
  <h2 class="fragment">The 5 steps ↔ the code</h2>
  <table class="codemap fragment">
    <tr><th>step</th><th>what it does</th><th>function <span class="dim">· src/evasion_tax/attack/</span></th></tr>
    <tr><td class="step">①</td><td>gradient of the loss w.r.t. the suffix one-hots</td><td class="fn">token_gradient()</td></tr>
    <tr><td class="step">②</td><td>keep the top-${DIMS.topK} candidate tokens per position</td><td class="fn">top_k_candidates()</td></tr>
    <tr><td class="step">③</td><td>sample B candidate suffixes (one position swapped)</td><td class="fn">sample_candidates()</td></tr>
    <tr><td class="step">④</td><td>forward pass → CE loss of each candidate</td><td class="fn">loss_of()</td></tr>
    <tr><td class="step">⑤</td><td>keep the lowest-loss candidate</td><td class="fn">select_best()</td></tr>
  </table>
  <p class="fragment caption">gcg.py = CPU reference · gcg_openvla.py = the OpenVLA seam (token_gradient / loss_of)</p>
`;

/* ---- Task 3: math slides (#5,#6,#7) ---- */

// The deck's one real computation: score[v] = grad_e · W[v]  (= grad_e @ Wᵀ).
function swapScores(gradE, W) {
  return W.map(row => row.reduce((s, w, j) => s + gradE[j] * w, 0));
}
// display formatter: 3-dp, trailing zeros trimmed (0.260 → "0.26", -0.005 → "-0.005")
function fmtScore(v) { const r = +v.toFixed(3); return r === 0 ? '0' : r.toString(); }

// #5 one-hot × W = pluck a row
builders[4] = () => {
  const oh = TOY_VOCAB.map((_, i) =>
    `<div class="ohcell ${i === TOY_CUR_TOKEN ? 'one' : ''}">${i === TOY_CUR_TOKEN ? 1 : 0}</div>`).join('');
  const mat = TOY_W.map((row, i) => `
    <div class="mrow" data-row="${i}">
      <span class="mlabel">${TOY_VOCAB[i]}</span>
      ${row.map(w => `<span class="mcell">${w.toFixed(2)}</span>`).join('')}
    </div>`).join('');
  const evec = TOY_W[TOY_CUR_TOKEN].map(w => `<span class="mcell">${w.toFixed(2)}</span>`).join('');
  return `
    <h2>What <span class="mono">one-hot × W</span> really is</h2>
    <div class="rowpluck">
      <div class="onehot">${oh}</div>
      <span class="eq">×</span>
      <div class="matrix" id="toyMatrix">${mat}</div>
      <span class="eq">=</span>
      <div class="evec" id="evec">${evec}</div>
    </div>
    <p class="fragment caption">A one-hot times the embedding matrix just <span class="gold">plucks one row</span>:
      <span class="mono">e<sub>i</sub> = W[${TOY_CUR_TOKEN}]</span> — the embedding of the current token
      "<span class="gold">${TOY_VOCAB[TOY_CUR_TOKEN]}</span>". That row is the continuous thing we can differentiate.</p>
  `;
};
slideEnterHandlers[4] = () => {
  const mat = document.getElementById('toyMatrix'); const evec = document.getElementById('evec');
  if (!mat) return;
  const rows = mat.querySelectorAll('.mrow');
  rows.forEach(r => r.classList.remove('pluck', 'dim'));
  evec.classList.remove('show');
  track(setTimeout(() => rows.forEach(r => {
    if (r.dataset.row === String(TOY_CUR_TOKEN)) r.classList.add('pluck'); else r.classList.add('dim');
  }), 600));
  track(setTimeout(() => evec.classList.add('show'), 1200));
};

// #6 backprop chain — gradient light sweeps right→left, stops at the integer token
builders[5] = () => {
  const nodes = [
    { t: 'token (int)', diff: false },
    { t: 'one-hot',     diff: true },
    { t: '@ W',         diff: true },
    { t: 'embedding e', diff: true },
    { t: 'Transformer', diff: true },
    { t: 'loss',        diff: true },
  ];
  const chain = nodes.map((n, i) => `<span class="node ${n.diff ? '' : 'nodiff'}" data-i="${i}">${n.t}</span>`)
    .join('<span class="ar">→</span>');
  return `
    <h2><span class="mono">d(loss)/d(suffix)</span>: differentiate the embedding</h2>
    <div class="chain" id="chain">${chain}</div>
    <p class="fragment caption">Back-propagation sends the gradient <span class="red">right → left</span>. It reaches the continuous
      <span class="mono">embedding e</span> and the <span class="mono">one-hot</span>, but stops at the
      <span class="dim">integer token</span> — which is <span class="dim">non-differentiable</span> (slide 3).
      So the gradient we actually use is <span class="mono">d(loss)/d(e_i)</span>.</p>
  `;
};
slideEnterHandlers[5] = () => {
  const chain = document.getElementById('chain'); if (!chain) return;
  const nodes = Array.from(chain.querySelectorAll('.node'));
  nodes.forEach(n => n.classList.remove('grad'));
  // sweep a single glow right→left across the differentiable nodes (skip the int-token node)
  const order = nodes.map((_, i) => i).reverse().filter(i => !nodes[i].classList.contains('nodiff'));
  order.forEach((idx, k) => track(setTimeout(() => {
    nodes.forEach(n => n.classList.remove('grad'));
    nodes[idx].classList.add('grad');
  }, 500 + k * 450)));
};

// #7 toy swap-scores — JS-computed, argmin flares red
builders[6] = () => {
  const scores = swapScores(TOY_GRAD_E, TOY_W);
  const argmin = scores.indexOf(Math.min(...scores));
  const rows = TOY_VOCAB.map((tok, v) => `
    <div class="score-row ${v === argmin ? 'win' : ''}" data-v="${v}">
      <span class="tok">${tok}</span>
      <span class="dim">grad_e·W[${v}]</span>
      <span class="val">${fmtScore(scores[v])}</span>
      ${v === argmin ? '<span class="tag">← top swap candidate</span>' : ''}
    </div>`).join('');
  return `
    <h2><span class="mono">grad_e @ Wᵀ</span> → a score for every token</h2>
    <p>From slide 6: <span class="mono">grad_e = d(loss)/d(e<sub>i</sub>) = [${TOY_GRAD_E.join(', ')}]</span></p>
    <div class="score-head">score[v] = Σ<sub>j</sub> grad_e[j] · W[v][j]</div>
    <div class="scores" id="scores">${rows}</div>
    <p class="fragment caption">The <span class="red">most-negative</span> score lowers the loss fastest → it is the top token to swap in.
      Here that's "<span class="red">${TOY_VOCAB[argmin]}</span>" (${fmtScore(scores[argmin])}).</p>
  `;
};
slideEnterHandlers[6] = () => {
  const box = document.getElementById('scores'); if (!box) return;
  const rows = Array.from(box.querySelectorAll('.score-row'));
  rows.forEach(r => r.classList.remove('show'));
  rows.forEach((r, k) => track(setTimeout(() => r.classList.add('show'), 300 + k * 420)));
};

/* ---- Task 4: hero ① — one GCG step (#8) ---- */
builders[7] = () => {
  const cur = LOSS_HISTORY[0], best = LOSS_HISTORY[1];   // the real first step: 15.60 → 14.46
  const base = Array.from({ length: 8 }, () => 'x');
  // 3 candidates, each swapping exactly ONE distinct position (n_replace = 1);
  // the winner's loss is the real next trajectory point, distractors are illustrative.
  const cands = [
    { pos: 5, tok: 'mang',  loss: cur - 0.4 },
    { pos: 1, tok: 'egg',   loss: best },
    { pos: 6, tok: 'robot', loss: cur - 0.8 },
  ];
  const winLoss = Math.min(...cands.map(c => c.loss));
  const gridCells = () => Array.from({ length: 40 }, () => '<div class="gcell"></div>').join('');
  const candRows = cands.map(c => {
    const cells = base.map((t, k) => `<span class="scell ${k === c.pos ? 'swap' : ''}">${k === c.pos ? c.tok : t}</span>`).join('');
    return `<div class="candrow ${c.loss === winLoss ? 'win' : ''}">${cells}<span class="closs">loss ${c.loss.toFixed(2)}</span></div>`;
  }).join('');
  return `
    <h2>Hero ① — one GCG step</h2>
    <div class="pipeline" id="pipe">
      <div class="pblock"><div class="pt">① gradient</div><div class="grid">${gridCells()}</div>
        <div class="pd">∂loss/∂onehot<br>${DIMS.L} × ${DIMS.V.toLocaleString()}</div></div>
      <div class="parrow">→</div>
      <div class="pblock"><div class="pt">② top-k</div><div class="grid gridB">${gridCells()}</div>
        <div class="pd">top-${DIMS.topK}<br>per position</div></div>
      <div class="parrow">→</div>
      <div class="pblock"><div class="pt">③ candidates</div>${candRows}
        <div class="pd">B candidates<br>n_replace = 1</div></div>
      <div class="parrow">→</div>
      <div class="pblock"><div class="pt">④ verify</div>
        <div class="pd">forward pass →<br>pick <span class="green">min loss</span></div>
        <div class="picked">✓ ${best.toFixed(2)}</div></div>
    </div>
    <button class="replay" onclick="playStep()">▷ replay</button>
    <p class="fragment caption">One iteration: rank every swap by gradient, keep the top-${DIMS.topK} per position,
      build B candidates that each change <span class="gold">exactly one</span> token, then run real forward passes
      and keep the <span class="green">lowest-loss</span> one (here ${cur.toFixed(2)} → ${best.toFixed(2)}).</p>
  `;
};

// playStep() — drives the four-block highlight sequence (global: also bound to the ▷ replay button).
function playStep() {
  const pipe = document.getElementById('pipe'); if (!pipe) return;
  const blocks = Array.from(pipe.querySelectorAll('.pblock'));
  const hots = Array.from(pipe.querySelectorAll('.gridB .gcell'));
  blocks.forEach(b => b.classList.remove('lit'));
  hots.forEach(c => c.classList.remove('hot'));
  pipe.classList.remove('showloss');
  const steps = [
    () => blocks[0].classList.add('lit'),
    () => { blocks[1].classList.add('lit'); hots.forEach((c, i) => { if (i % 4 === 0) c.classList.add('hot'); }); },
    () => blocks[2].classList.add('lit'),
    () => { blocks[3].classList.add('lit'); pipe.classList.add('showloss'); },
  ];
  steps.forEach((fn, k) => track(setTimeout(fn, 350 + k * 800)));
}
slideEnterHandlers[7] = () => playStep();

/* ---- Task 5: hero ② loop (#9) + real mapping (#11) ---- */

// map a loss value to a bar height (%) from the real min/max — heights are DERIVED, never hard-coded.
function barHeight(loss) {
  const lo = Math.min(...LOSS_HISTORY), hi = Math.max(...LOSS_HISTORY);
  return 12 + ((loss - lo) / (hi - lo)) * 88;     // lo → 12% (still visible), hi → 100%
}

// 10 swaps (one per loss transition) carrying an all-"x" suffix toward FINAL_SUFFIX's flavour.
const LOOP_SWAPS = [
  { pos: 0,  tok: 'xforum' }, { pos: 4,  tok: 'im' },     { pos: 3,  tok: 'mang' },
  { pos: 10, tok: 'egg' },    { pos: 12, tok: 'robot' },  { pos: 16, tok: 'flower' },
  { pos: 15, tok: 'He' },     { pos: 14, tok: '明' },      { pos: 6,  tok: 'forum' },
  { pos: 9,  tok: 'mang' },
];
const loop = { i: 0, timer: null };

// #9 Loop
builders[8] = () => `
  <h2>Hero ② — the loop drives the loss down</h2>
  <div class="loop-suffix" id="loopSuffix"></div>
  <div class="lossbar-wrap">
    <div class="lossbar"><div class="lossfill" id="lossFill"></div></div>
    <div class="lossnum" id="lossNum">loss —</div>
  </div>
  <div class="loop-ctrls">
    <button onclick="playLoop()">▷ play</button>
    <button onclick="loopPause()">⏸ pause</button>
    <button onclick="loopStep()">⏭ step</button>
    <button onclick="loopReset()">⟲ reset</button>
    <span id="loopStat" class="dim"></span>
  </div>
  <p class="fragment caption">Each iteration runs hero ① once: one token <span class="red">flashes</span> and swaps, the loss
    bar drops a notch. This replays the real tiny-run trajectory <span class="green">${LOSS_HISTORY[0].toFixed(2)} → ${LOSS_HISTORY[LOSS_HISTORY.length - 1].toFixed(2)}</span> over ${LOSS_HISTORY.length - 1} steps.</p>
`;

function loopRender() {
  const cells = Array.from({ length: DIMS.L }, () => 'x');
  for (let k = 0; k < loop.i; k++) { const s = LOOP_SWAPS[k]; if (s) cells[s.pos] = s.tok; }
  const box = document.getElementById('loopSuffix'); if (!box) return;
  box.innerHTML = cells.map((t, p) => `<span class="lcell" data-p="${p}">${t}</span>`).join('');
  const loss = LOSS_HISTORY[loop.i];
  document.getElementById('lossFill').style.height = barHeight(loss) + '%';
  document.getElementById('lossNum').textContent = 'loss ' + loss.toFixed(2);
  document.getElementById('loopStat').textContent = `step ${loop.i} / ${LOSS_HISTORY.length - 1}`;
}

// advance one iteration: apply the next swap, drop the bar, flash the swapped cell.
function loopStep() {
  if (loop.i >= LOSS_HISTORY.length - 1) { loopPause(); return; }
  const s = LOOP_SWAPS[loop.i];
  loop.i++;
  loopRender();
  const cell = document.querySelector(`#loopSuffix .lcell[data-p="${s.pos}"]`);
  if (cell) { cell.classList.add('flash'); track(setTimeout(() => cell.classList.remove('flash'), 700)); }
}

function loopPause() { if (loop.timer) { clearInterval(loop.timer); loop.timer = null; } }
function loopReset() { loopPause(); loop.i = 0; loopRender(); }

// playLoop() — auto-play ~2 s/step (plan-named entry point; also the ▷ play button).
function playLoop() {
  loopPause();
  if (loop.i >= LOSS_HISTORY.length - 1) loop.i = 0;
  loopRender();
  loop.timer = track(setInterval(() => {
    if (loop.i >= LOSS_HISTORY.length - 1) { loopPause(); return; }
    loopStep();
  }, 2000));
}
slideEnterHandlers[8] = () => { loopReset(); playLoop(); };

// #11 Real mapping — same LOSS_HISTORY drawn as a falling line
builders[10] = () => {
  const W = 520, H = 180, pad = 26;
  const lo = Math.min(...LOSS_HISTORY), hi = Math.max(...LOSS_HISTORY);
  const pts = LOSS_HISTORY.map((v, i) => {
    const x = pad + i * (W - 2 * pad) / (LOSS_HISTORY.length - 1);
    const y = pad + (1 - (v - lo) / (hi - lo)) * (H - 2 * pad);   // high loss → top, low → bottom
    return [x, y];
  });
  const poly = pts.map(p => p.join(',')).join(' ');
  const dots = pts.map(([x, y], i) => `<circle cx="${x}" cy="${y}" r="3" fill="${i === pts.length - 1 ? 'var(--green)' : 'var(--blue)'}"/>`).join('');
  const first = pts[0], last = pts[pts.length - 1];
  return `
    <h2>Mapping to the real thing</h2>
    <div class="dims fragment">
      <span>V = <b>${DIMS.V.toLocaleString()}</b> tokens</span>
      <span>d = <b>${DIMS.d.toLocaleString()}</b> dims</span>
      <span>L = <b>${DIMS.L}</b> suffix tokens</span>
    </div>
    <svg class="spark fragment" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
      <polyline points="${poly}" fill="none" stroke="var(--green)" stroke-width="2.5"/>
      ${dots}
      <text x="${first[0]}" y="${first[1] - 8}" class="sparklab">${LOSS_HISTORY[0].toFixed(2)}</text>
      <text x="${last[0] - 8}" y="${last[1] + 18}" class="sparklab end">${LOSS_HISTORY[LOSS_HISTORY.length - 1].toFixed(2)}</text>
    </svg>
    <p class="fragment caption">The same ${LOSS_HISTORY.length}-point trajectory as slide 9, shown as a line. From this project's tiny run
      (<span class="mono">results/_smoke/…gcg-tiny-smoke</span>): loss ${LOSS_HISTORY[0].toFixed(2)} → ${LOSS_HISTORY[LOSS_HISTORY.length - 1].toFixed(2)} over ${LOSS_HISTORY.length - 1} steps — illustrative teaching values, not a new result.</p>
  `;
};
slideEnterHandlers[10] = () => {
  const pl = document.querySelector('.spark polyline'); if (!pl) return;
  const len = pl.getTotalLength();
  pl.style.transition = 'none';
  pl.style.strokeDasharray = len;
  pl.style.strokeDashoffset = len;
  pl.getBoundingClientRect();   // force reflow
  track(setTimeout(() => { pl.style.transition = 'stroke-dashoffset 1.6s ease'; pl.style.strokeDashoffset = 0; }, 100));
};

/* ------------------------------------------------------------ *
 * BUILD & SHOW                                                 *
 * ------------------------------------------------------------ */
function buildAll() {
  for (let i = 0; i < slides.length; i++) {
    if (builders[i]) slides[i].innerHTML = builders[i]();
  }
}
buildAll();
goTo(0, false);
</script>
</body>
</html>
