# M1 two-tier target validation-pilot (docs/plans/2026-07-03-m1-attack-target-redesign.md, Task 8).
#
# The smallest de-risk run BEFORE committing the ~2x matrix: ONE anchor target
# (Tier A, RoboGCG-clean max-mag single dim) + ONE semantic target (Tier B,
# policy-derived wrong-object redirect), on 1 task / 1 seed. search_width and
# n_steps are CLI args (below); GCG early_stop is always ON (reached_fn=target.reached).
#
# What it de-risks:
#   * Anchor reaches -> the harness is correct and the M1 failure was purely target
#     difficulty (falsifies a harness bug).
#   * Semantic reaches the single-frame token target + a clean adversary rollout
#     reaches the distractor + the attacked rollout drives EE toward it (world
#     approach ASR) -> single-frame token-manifold reachability + a realizable
#     adversary task + detector-frame alignment.
#
# ONE VARIABLE AT A TIME: anchor and semantic write to SEPARATE --run-names (a
# resume can never cross tiers; see run_attack _RESUME_KEYS). The semantic run also
# needs configs/semantic_targets/libero_spatial.json (Task 3b — pending author
# sign-off) and the pre-registration separation guard (scripts/check_semantic_separation.py).
#
# ===================================================================================
#  GPU LONG-RUN GATE (CLAUDE.md, [[gpu-long-run-gate]]): each 500-step target ~= ~5 h
#  on the registered CSB A5000. DO NOT LAUNCH without explicit author approval. Log
#  exact HW/env; write-once results/; no cross-HW mixing.
# ===================================================================================
#
# Launch (after benign baseline + schema_repinned.json exist; the box uses uv + egl):
#   export MUJOCO_GL=egl
#   # Tier A (anchor) — first, to falsify a harness bug:
#   PYTHONPATH=~/LIBERO uv run python scripts/run_attack.py --config configs/m1_target_pilot.yaml \
#     --schema-from results/m1-benign-baseline/schema_repinned.json \
#     --n-attacked 1 --n-steps 500 --search-width 512 --eval-batch 32 \
#     --target-tier anchor --run-name m1-pilot-anchor --openvla-root ~/openvla --exclusive-gpu
#   # Tier B (semantic) — separate run dir:
#   PYTHONPATH=~/LIBERO uv run python scripts/run_attack.py --config configs/m1_target_pilot.yaml \
#     --schema-from results/m1-benign-baseline/schema_repinned.json \
#     --n-attacked 1 --n-steps 500 --search-width 512 --eval-batch 32 \
#     --target-tier semantic --semantic-registry configs/semantic_targets \
#     --run-name m1-pilot-semantic --openvla-root ~/openvla --exclusive-gpu

seed: 42

model:
  name: openvla-7b
  unnorm_key: libero_spatial  # finetuned checkpoint key (box-verified, NOT *_no_noops)
  checkpoint: openvla/openvla-7b-finetuned-libero-spatial
  quantization: bf16

env:
  suite: libero_spatial
  tasks: [task_0]
  max_steps: 220  # OpenVLA libero_spatial default (run_libero_eval @ c8f03f48)

attack:
  name: robogcg
  targets_per_task: 1  # pilot: a single target per task (anchor idx 0 / the pinned semantic)
  persistence_steps: 5  # reused as the Tier-B world-frame ASR window (author decision)

metric:
  k: 5  # causal prefix-window length a_{t-k+1:t}

detector:
  fpr_targets: [0.01, 0.05]
  primary_fpr: 0.05

eval:
  matrix: [clean_ceiling, coarse_goal]
  splits:
    # Attacked units are drawn from calib (matched to the benign calib scene). The pilot
    # is a single unit: (task_0, target_0, seed_42). test is disjoint (unused by the pilot).
    calib:
      tasks: [task_0]
      scenes: [scene_0]
      seeds: [42]
    test:
      tasks: [task_1]
      scenes: [scene_1]
      seeds: [43]
