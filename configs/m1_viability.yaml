# M1 viability-gate run config (docs/plans/2026-06-24-m1-viability-gate.md).
# Verified CSB-A5000 box values (the step-4 gotchas): the LIBERO-spatial fine-tune
# registers action norm_stats under `libero_spatial` (NOT `*_no_noops`), and the HF
# id to load is `model.checkpoint`. Task/target counts are sized small per the M1
# branch (provisional N-/F); raise after the D8 early-stop bench refines the budget.
#
# Box launch sequence (after `git pull`, env steps 1-6 done). ALWAYS invoke through
# the uv-managed venv with `uv run python` — bare `python` picks the conda `base`
# env, which lacks the project deps (yaml/numpy/torch). LIBERO/GPU steps (1, 3) also
# need `MUJOCO_GL=egl` + `PYTHONPATH=~/LIBERO` + `--openvla-root ~/openvla` (step-4
# gotcha). If `uv run` prunes the GPU stack, fall back to `uv run --no-sync python`.
# Run dirs are STABLE (--run-name, reused across restarts) so paths are deterministic and
# --resume / the unattended until-loop actually resume: benign -> results/m1-benign-baseline/,
# attack -> results/m1-robogcg-redirect/. Pilot first (--n-benign 10), then the full run.
#   export MUJOCO_GL=egl
#   1. PYTHONPATH=~/LIBERO uv run python scripts/run_benign.py --config configs/m1_viability.yaml \
#        --n-benign 300 --calib-frac 0.25 --openvla-root ~/openvla --resume
#   2. uv run python scripts/repin_schema.py \
#        --geometry results/m1-benign-baseline/geometry_stats.json \
#        --out      results/m1-benign-baseline/schema_repinned.json   # lock DM-3 (record §5); CPU-only
#   3. PYTHONPATH=~/LIBERO uv run python scripts/run_attack.py --config configs/m1_viability.yaml \
#        --schema-from results/m1-benign-baseline/schema_repinned.json --n-attacked 10 \
#        --n-steps 500 --search-width 512 --eval-batch 32 --openvla-root ~/openvla \
#        --exclusive-gpu --resume                              # dry run first: --n-attacked 1 --n-steps 20
#   4. uv run python scripts/m1_gate_report.py \
#        --benign results/m1-benign-baseline/benign_records.json \
#        --attack results/m1-robogcg-redirect/attack_records.json --n-steps-cap 500   # CPU-only

seed: 42

model:
  name: openvla-7b
  unnorm_key: libero_spatial  # finetuned checkpoint key (box-verified, NOT *_no_noops)
  checkpoint: openvla/openvla-7b-finetuned-libero-spatial
  quantization: bf16

env:
  suite: libero_spatial
  tasks: [task_0, task_1, task_2]
  max_steps: 220  # OpenVLA libero_spatial default (run_libero_eval @ c8f03f48)

attack:
  name: robogcg
  targets_per_task: 20
  persistence_steps: 5

metric:
  k: 5  # causal prefix-window length a_{t-k+1:t}

detector:
  fpr_targets: [0.01, 0.05]
  primary_fpr: 0.05  # 1% needs held-out benign N >= ~300 (rule of three)

eval:
  matrix: [clean_ceiling, coarse_goal]
  splits:
    # Calibration and test disjoint on every axis (assert_disjoint). Attacked units
    # (run_attack) are drawn from the calib tasks/seeds so benign-vs-attacked is matched.
    calib:
      tasks: [task_0]
      scenes: [scene_0]
      seeds: [42]
    test:
      tasks: [task_1, task_2]
      scenes: [scene_1, scene_2]
      seeds: [43, 44]
